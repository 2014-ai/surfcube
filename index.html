<!DOCTYPE html>
<html lang="pt-br">
<head><link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Surf Cube - Luiz Felipe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; color: white; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 22px; font-weight: bold; z-index: 10; display: none; text-shadow: 2px 2px #000; }
        
        #powerStatus { position: absolute; top: 110px; left: 20px; color: #fff; font-size: 16px; font-weight: bold; display: none; z-index: 10; }
        #shieldCount { color: #00ffff; text-shadow: 1px 1px #000; }
        #powerTimer { color: #ffd700; display: none; }

        #settingsBtn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; z-index: 1100; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        #shopBtn { position: absolute; top: 80px; right: 20px; font-size: 30px; cursor: pointer; z-index: 1100; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        #pauseBtn { position: absolute; top: 70px; left: 20px; font-size: 25px; cursor: pointer; z-index: 1100; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 10px; display: none; color: white; border: 1px solid white; }
        
        #pauseMenu, #shopPanel, #settingsPanel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; justify-content: center;
        }

        /* Estilo da fonte clara no Pause */
        .pause-coins { color: #f0f0f0; font-size: 24px; font-weight: 300; margin-bottom: 20px; text-shadow: 1px 1px 5px rgba(255,255,255,0.2); }

        .config-row { display: flex; justify-content: space-between; align-items: center; width: 260px; margin: 15px 0; font-size: 18px; font-weight: bold; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 350px; margin-top: 10px; overflow-y: auto; max-height: 40vh; }
        .shop-item { background: #333; padding: 10px; border-radius: 10px; border: 1px solid #ffd700; display: flex; flex-direction: column; align-items: center; }
        .color-preview { width: 30px; height: 30px; border-radius: 5px; border: 1px solid white; margin-bottom: 5px; }
        
        button { padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; color: white; text-transform: uppercase; margin: 5px; box-shadow: 0 4px #000; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #000; }
        .fácil { background: #4CAF50; width: 220px; }
        .médio { background: #FF9800; width: 220px; }
        .insano { background: #f44336; width: 220px; }
        
        .welcome-text { color: #FFFFFF; font-size: 15px; line-height: 1.5; max-width: 320px; margin: 15px 0 25px 0; font-weight: bold; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="settingsBtn" onclick="abrirConfig()">⚙️</div>
    <div id="shopBtn" onclick="abrirLoja()">🛒</div>
    <div id="pauseBtn" onclick="pausarJogo()">⏸️</div>
    
    <div id="powerStatus">
        🛡️ ESCUDOS: <span id="shieldCount">0</span><br>
        <span id="powerTimer">ATIVO: 10s</span>
    </div>

    <div id="settingsPanel">
        <h2 style="color:#ffd700">CONFIGURAÇÕES</h2>
        <div class="config-row"><span>SOMBRAS</span><input type="checkbox" id="shadowToggle" checked style="transform: scale(1.8);"></div>
        <div class="config-row"><span>SOM</span><input type="checkbox" id="soundToggle" checked style="transform: scale(1.8);"></div>
        <button onclick="fecharConfig()" style="background: #2196F3; width: 200px; margin-top: 30px;">FECHAR</button>
    </div>

    <div id="pauseMenu">
        <h1 style="color:#ffd700; margin-bottom: 5px;">PAUSADO</h1>
        <div class="pause-coins">💰 Minhas Moedas: <span id="pauseCoinsDisplay">0</span></div>
        <button class="fácil" onclick="despausarJogo()">CONTINUAR</button>
        <button class="insano" onclick="location.reload()">SAIR</button>
    </div>

    <div id="shopPanel">
        <h2 style="color:#ffd700">LOJA</h2>
        <p>Saldo: 💰 <span id="shopCoins">0</span></p>
        <div style="background: #444; padding: 15px; border-radius: 10px; width: 85%; max-width: 300px; margin-bottom: 15px; border: 2px solid #00ffff;">
            <h3 style="margin:0; color:#00ffff">ESCUDO INVISÍVEL</h3>
            <button onclick="comprarPowerUp()" style="background:#6200ea; width:100%">COMPRAR (💰500)</button>
        </div>
        <div class="shop-grid" id="shopGrid"></div>
        <button onclick="fecharLoja()" style="margin-top: 15px; background: #666; width: 150px;">FECHAR</button>
    </div>

    <div id="menu" class="overlay">
        <h1 style="color:#ffd700; text-shadow: 3px 3px #f00; font-size: 50px; margin: 0;">SURF CUBE</h1>
        <p class="welcome-text">
            Seja bem-vindo ao meu jogo teste, meu nome é Luiz Felipe. Os obstáculos roxo e amarelo são para agachar e pular.
        </p>
        <button class="fácil" onclick="iniciar(2500, 0.45)">FÁCIL</button>
        <button class="médio" onclick="iniciar(1200, 0.6)">MÉDIO</button>
        <button class="insano" onclick="iniciar(700, 0.8)">INSANO</button>
    </div>

    <div id="ui">SCORE: <span id="pts">0</span> | 💰: <span id="coinsDisplay">0</span></div>

    <div id="death" class="overlay" style="display: none;">
        <h1 style="color: #f44336; font-size: 40px;">BATEU!</h1>
        <button onclick="location.reload()" style="background:#FF9800; width:200px">RECOMEÇAR</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- EFEITOS SONOROS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol=0.1) {
            if(!document.getElementById('soundToggle').checked) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            jump: () => playSound(400, 'square', 0.2),
            crouch: () => playSound(200, 'sine', 0.2),
            coin: () => { playSound(800, 'sine', 0.1); setTimeout(() => playSound(1200, 'sine', 0.1), 50); },
            power: () => playSound(300, 'sawtooth', 0.5, 0.05),
            hit: () => playSound(100, 'sawtooth', 0.4, 0.2)
        };

        let moedas = parseInt(localStorage.getItem('coins')) || 0;
        let escudosDisponiveis = parseInt(localStorage.getItem('shields')) || 0;
        let corSalva = localStorage.getItem('playerColor') || "#ff4444";
        let inventario = JSON.parse(localStorage.getItem('inventory')) || ["#ff4444"];
        
        let jogando = false, pausado = false, score = 0, lane = 0, speed = 0.5;
        let powerAtivo = false, powerTempo = 0, lastTap = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(5, 15, 5); sun.castShadow = true;
        scene.add(sun);

        const player = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: corSalva, transparent: true, opacity: 1 }));
        player.position.y = 0.35; player.castShadow = true;
        scene.add(player);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 2000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
        scene.add(floor);
        camera.position.set(0, 4, 7);

        let obstacles = [], coins = [], jumping = false, crouching = false, yVel = 0;

        function abrirConfig() { document.getElementById('settingsPanel').style.display = 'flex'; }
        function fecharConfig() { 
            renderer.shadowMap.enabled = document.getElementById('shadowToggle').checked;
            document.getElementById('settingsPanel').style.display = 'none'; 
        }
        function abrirLoja() { document.getElementById('shopPanel').style.display = 'flex'; atualizarUI(); renderLoja(); }
        function fecharLoja() { document.getElementById('shopPanel').style.display = 'none'; }
        
        function pausarJogo() { 
            pausado = true; 
            document.getElementById('pauseMenu').style.display = 'flex'; 
            document.getElementById('pauseCoinsDisplay').innerText = moedas; // Atualiza moedas no pause
        }
        function despausarJogo() { pausado = false; document.getElementById('pauseMenu').style.display = 'none'; }

        function atualizarUI() {
            document.getElementById('coinsDisplay').innerText = moedas;
            document.getElementById('shopCoins').innerText = moedas;
            document.getElementById('shieldCount').innerText = escudosDisponiveis;
        }

        function comprarPowerUp() {
            if (moedas >= 500) {
                moedas -= 500; escudosDisponiveis++;
                localStorage.setItem('coins', moedas); localStorage.setItem('shields', escudosDisponiveis);
                atualizarUI();
            }
        }

        function renderLoja() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = "";
            const cores = [
                {n:"Vermelho",c:"#ff4444",p:0},
                {n:"Laranja",c:"#ff8c00",p:10},
                {n:"Verde Claro",c:"#2ecc71",p:20},
                {n:"Azul",c:"#3498db",p:30},
                {n:"Roxo",c:"#9b59b6",p:75},
                {n:"Verde Escuro",c:"#006400",p:100},
                {n:"Ouro",c:"#ffd700",p:1000}
            ];
            cores.forEach(item => {
                const jaTem = inventario.includes(item.c);
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<div class="color-preview" style="background:${item.c}"></div>
                    <button style="font-size:10px; padding:5px; box-shadow:none; width:100%" onclick="comprarCor('${item.c}', ${item.p})">${jaTem ? (corSalva === item.c ? 'USANDO' : 'USAR') : '💰'+item.p}</button>`;
                grid.appendChild(div);
            });
        }

        function comprarCor(cor, preco) {
            if (inventario.includes(cor)) { corSalva = cor; player.material.color.set(cor); localStorage.setItem('playerColor', cor); }
            else if (moedas >= preco) { moedas -= preco; inventario.push(cor); localStorage.setItem('coins', moedas); localStorage.setItem('inventory', JSON.stringify(inventario)); }
            renderLoja(); atualizarUI();
        }

        function iniciar(t, s) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            jogando = true; speed = s;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('powerStatus').style.display = 'block';
            atualizarUI();
            setInterval(spawnObs, t);
            setInterval(spawnCoinBatch, t);
        }

        function spawnObs() { 
            if(!jogando || pausado) return; 
            const L = Math.floor(Math.random()*3)-1; 
            const alto = Math.random()>0.65; 
            const obs = new THREE.Mesh(new THREE.BoxGeometry(2, alto?1.1:0.8, 0.7), new THREE.MeshStandardMaterial({ color: alto?0x800080:0xFFFF00 })); 
            obs.position.set(L*3, alto?1.3:0.4, -60); 
            obs.userData = { tipo: alto?"A":"B", p: L }; 
            scene.add(obs); 
            obstacles.push(obs); 
        }

        function spawnCoinBatch() { if(!jogando || pausado) return; const L = Math.floor(Math.random()*3)-1; for(let i=0; i<3; i++) { const c = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1, 8, 16), new THREE.MeshStandardMaterial({ color: 0xffd700 })); c.position.set(L*3, 0.6, -60 - (i*3)); c.rotation.x = Math.PI/2; scene.add(c); coins.push(c); } }

        let sx = 0, sy = 0;
        window.addEventListener('touchstart', e => {
            let currentTime = new Date().getTime();
            if (currentTime - lastTap < 300) { /* Poder invisível aqui se quiser */ e.preventDefault(); }
            lastTap = currentTime;
            sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            if(!jogando || pausado) return;
            let dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
            if (Math.abs(dx) > Math.abs(dy)) { if (dx > 30 && lane < 1) lane++; else if (dx < -30 && lane > -1) lane--; }
            else { 
                if (dy < -30 && !jumping && !crouching) { jumping = true; yVel = 0.32; sounds.jump(); } 
                else if (dy > 30 && !jumping && !crouching) { crouching = true; player.scale.y = 0.4; player.position.y = 0.15; sounds.crouch(); setTimeout(() => { crouching = false; player.scale.y = 1; player.position.y = 0.35; }, 650); } 
            }
        });

        function update() {
            requestAnimationFrame(update);
            if (jogando && !pausado) {
                if (jumping) { player.position.y += yVel; yVel -= 0.016; if (player.position.y <= 0.35) { player.position.y = 0.35; jumping = false; } }
                player.position.x += (lane * 3 - player.position.x) * 0.2;
                obstacles.forEach((o, i) => {
                    o.position.z += speed;
                    if (Math.abs(o.position.z - player.position.z) < 0.8 && lane === o.userData.p) {
                        if ((o.userData.tipo === "A" && !crouching) || (o.userData.tipo === "B" && !jumping)) { 
                            jogando = false; sounds.hit(); document.getElementById('death').style.display = 'flex'; 
                        }
                    }
                    if (o.position.z > 10) { scene.remove(o); obstacles.splice(i, 1); score++; document.getElementById('pts').innerText = score; }
                });
                coins.forEach((c, i) => {
                    c.position.z += speed;
                    if (player.position.distanceTo(c.position) < 1.0) { sounds.coin(); scene.remove(c); coins.splice(i, 1); moedas++; atualizarUI(); localStorage.setItem('coins', moedas); }
                    if (c.position.z > 10) { scene.remove(c); coins.splice(i, 1); }
                });
            }
            renderer.render(scene, camera);
        }
        update();
    </script>
</body>
</html>
